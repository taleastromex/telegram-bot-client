name: Frontend CI

on:
  push:
    paths:
      - 'resources/js/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run lint

      - run: npm run type-check

      - run: npm run build
