services:

  composer:
    image: composer:latest
    container_name: tg_client_composer
    working_dir: /var/www
    command: composer install --no-interaction
    volumes:
      - .:/var/www
    profiles:
      - setup

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_client_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment 2>/dev/null | grep -q 'Application Name' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tg_client_network

  nginx:
    image: nginx:1.25-alpine
    container_name: tg_client_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tg_client_network

  postgres:
    image: postgres:16-alpine
    container_name: tg_client_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tg_client}
      POSTGRES_USER: ${DB_USERNAME:-tg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tg_user} -d ${DB_DATABASE:-tg_client}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tg_client_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tg_client_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT_EXTERNAL:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tg_client_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg_client_queue
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    command: php artisan queue:work rabbitmq --sleep=3 --tries=3 --timeout=90
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      app:
        condition: service_healthy
    networks:
      - tg_client_network

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  tg_client_network:
    driver: bridge
